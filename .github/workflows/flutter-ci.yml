name: build
on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze project source
        run: flutter analyze .

      - name: Cache FlexDelegate library (macOS)
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/flutter_litert
          key: flex-delegate-macos-v1.0.0

      - name: Run tests
        run: flutter test

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze project source
        run: flutter analyze .

      - name: Cache FlexDelegate library (Linux)
        uses: actions/cache@v4
        with:
          path: ~/.cache/flutter_litert
          key: flex-delegate-linux-v1.0.0

      - name: Run tests
        run: flutter test
